<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Deep Tech Background -->
    <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#172554;stop-opacity:1" />
    </linearGradient>

    <!-- Cyberpunk Accents -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle Grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Profile Pic Clip -->
    <clipPath id="profileClip">
      <circle cx="35" cy="35" r="35" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#000000" />
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.5"/>

  <!-- =========================================
       RIGHT SIDE: MCP ARCHITECTURE ANIMATION
       ========================================= -->
  <g transform="translate(940, 320) scale(1.3)">

    <!-- CENTRAL HUB: The AI Client (Context Consumer) -->
    <g filter="url(#glow)">
      <!-- Pulsing Core -->
      <circle cx="0" cy="0" r="30" fill="none" stroke="#22d3ee" stroke-width="2">
        <animate attributeName="r" values="30;34;30" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- Inner Brain/Chip -->
      <path d="M-12,-12 L12,-12 L12,12 L-12,12 Z" fill="#22d3ee" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
      </path>
      <text x="0" y="55" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="14" fill="#22d3ee" letter-spacing="2">AI CONTEXT</text>
    </g>

    <!-- NODE 1: GIT REPO (Top) -->
    <g transform="translate(0, -140)">
      <circle r="24" fill="#0f172a" stroke="#f97316" stroke-width="2" filter="url(#glow)"/>
      <path d="M-8,-5 L0,-12 L8,-5 M-8,5 L0,12 L8,5" stroke="#f97316" stroke-width="2" fill="none"/>
      <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#f97316">GIT REPO</text>
      <path d="M0,24 L0,116" stroke="url(#neonOrange)" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
      <circle r="4" fill="#f97316" filter="url(#glow)">
        <animateMotion dur="1.5s" repeatCount="indefinite" path="M0,24 L0,116" keyPoints="0;1" keyTimes="0;1" calcMode="linear"/>
      </circle>
    </g>

    <!-- NODE 2: OPEN API (Bottom Right) -->
    <g transform="translate(120, 70)">
      <circle r="24" fill="#0f172a" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)"/>
      <circle r="10" stroke="#8b5cf6" stroke-width="1" fill="none"/>
      <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#8b5cf6">OPEN API</text>
      <path d="M-20,-12 L-98,-58" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
      <circle r="4" fill="#8b5cf6" filter="url(#glow)">
        <animateMotion dur="2s" repeatCount="indefinite" path="M-20,-12 L-98,-58" keyPoints="0;1" keyTimes="0;1" calcMode="linear"/>
      </circle>
    </g>

    <!-- NODE 3: JIRA (Bottom Left) -->
    <g transform="translate(-120, 70)">
      <circle r="24" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
      <path d="M-6,-10 L6,0 L-6,10 M6,-10 L-6,0 L6,10" stroke="#10b981" stroke-width="2" fill="none"/>
      <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="#10b981">JIRA</text>
      <path d="M20,-12 L98,-58" stroke="#10b981" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
      <circle r="4" fill="#10b981" filter="url(#glow)">
        <animateMotion dur="2.5s" repeatCount="indefinite" path="M20,-12 L98,-58" keyPoints="0;1" keyTimes="0;1" calcMode="linear"/>
      </circle>
    </g>
  </g>



</svg>
